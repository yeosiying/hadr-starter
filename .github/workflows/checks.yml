name: checks

# Deterministic gate (scripts/check.sh): ruff + pytest. Same answer twice.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint + test
        run: ./scripts/check.sh
